# =============================================
logging.file.name=logs/autoauction-${spring.application.name}.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.file-name-pattern=${LOG_FILE}.%d{yyyy-MM-dd}.%i.gz
logging.logback.rollingpolicy.total-size-cap=2GB

# =============================================
# ?????? ??????????? ?? ???????
# =============================================
# ???? ??????
logging.level.com.example.autoauction.auction=DEBUG
logging.level.com.example.autoauction.bid=DEBUG
logging.level.com.example.autoauction.vehicle=INFO
logging.level.com.example.autoauction.user=INFO
logging.level.com.example.autoauction.auth=DEBUG
logging.level.com.example.autoauction.diagnostic=INFO
logging.level.com.example.autoauction.admin=INFO

# ?????? ??? ????????
logging.group.auction=com.example.autoauction.auction,com.example.autoauction.bid
logging.group.users=com.example.autoauction.user,com.example.autoauction.auth
logging.level.auction=DEBUG
logging.level.users=INFO

# ????????? ?????????? (???????? ????)
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.transaction=INFO

